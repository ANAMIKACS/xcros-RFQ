<div class="replies-section">
  <div class="replies-header">
    Replies
  </div>
  @for (item of replies; track item) {

  <div class="reply-card">
    <div class="reply-left">
        <div class="d-flex flex-row gap-3">
            <img [src]="item.image" class="profile-img">

  <div class="content">
    <h3>{{ item.name }}</h3>

    <div class="date">
      <i class="fa-solid fa-calendar"></i>
      {{ item.date }}
    </div>
        </div>
  
</div>
    <p class="desc">
      {{ item.description }}
    </p>

    <button class="view-btn">
      View More Replies
    </button>


</div>

    <div class="reply-right">

      <button class="download-btn green">
        Download Company Broucher
        <i class="fa-solid fa-download"></i>
      </button>

      <button class="download-btn orange">
        Download Project Broucher
        <i class="fa-solid fa-download"></i>
      </button>

      <div class="stats">

        <div class="stat-box">
          <i class="fa-solid fa-eye"></i>
          <span>100</span>
        </div>

        <div class="stat-box">
          <i class="fa-solid fa-heart"></i>
          <span>100</span>
        </div>

        <div class="icon-box">
          <i class="fa-solid fa-envelope"></i>
        </div>

        <div class="icon-box">
          <i class="fa-solid fa-flag"></i>
        </div>

      </div>

    </div>

  </div>

  }

</div>
